<!DOCTYPE html>
<html lang="ko" data-theme="dark" data-accent="crimson">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Music — YouTube Music Premium Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-app: #030303;
      --bg-sidebar: #0f0f0f;
      --bg-card: #1f1f1f;
      --bg-hover: #2f2f2f;
      --bg-input: #212121;
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-muted: #aaaaaa;
      --shadow: 0 16px 32px rgba(0, 0, 0, 0.8);
      --accent: #ff0033;
      --accent-rgb: 255, 0, 51;
      --accent-gradient: linear-gradient(135deg, #ff0033, #ff4500);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background-color: var(--bg-app);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      height: calc(100vh - 90px);
      width: 100%;
    }

    /* Sidebar Design */
    .sidebar {
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-left: 0.5rem;
    }

    .brand-logo-ym {
      width: 30px;
      height: 30px;
      background: var(--accent-gradient);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.6);
    }

    .brand-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .nav-item:hover, .nav-item.active {
      background-color: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .nav-item.active {
      font-weight: 700;
    }

    /* Main Content Area */
    .main-viewport {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .top-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background-color: rgba(3, 3, 3, 0.9);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      max-width: 480px;
    }

    .search-input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.6rem;
      border-radius: 6px;
      border: 1px solid transparent;
      background-color: var(--bg-input);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
    }

    .search-input:focus {
      background-color: var(--bg-hover);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .search-icon-svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
    }

    .view-content-pane {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem 4rem 2rem;
    }

    .view-pane {
      display: none;
    }

    .view-pane.active {
      display: block;
    }

    /* Mood Filter Chips (YT Music Style) */
    .mood-chips-container {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }

    .mood-chip {
      padding: 0.5rem 1rem;
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .mood-chip:hover {
      background-color: rgba(255, 255, 255, 0.15);
    }

    .mood-chip.active {
      background-color: var(--text);
      color: var(--bg-app);
      font-weight: 600;
    }

    /* YT Music Shelf Sections */
    .shelf-section {
      margin-bottom: 2.5rem;
    }

    .shelf-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 1rem;
    }

    .shelf-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* Quick Picks Grid (4 rows high, multi-column) */
    .quick-picks-grid {
      display: grid;
      grid-template-rows: repeat(4, auto);
      grid-auto-flow: column;
      grid-auto-columns: minmax(340px, 1fr);
      gap: 0.75rem 1.5rem;
      overflow-x: auto;
      padding-bottom: 1rem;
    }

    .quick-pick-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .quick-pick-item:hover {
      background-color: rgba(255, 255, 255, 0.08);
    }

    .qp-thumbnail {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      object-fit: cover;
      background-color: #000;
    }

    .qp-meta {
      flex: 1;
      min-width: 0;
      padding-right: 2.5rem; /* Space for action button */
    }

    .qp-title {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .qp-artist {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Inline Add Button Style */
    .inline-add-btn {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.1rem;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 5;
    }

    .inline-add-btn:hover {
      background: var(--accent);
      transform: translateY(-50%) scale(1.1);
    }

    /* Standard Cards Grid */
    .yt-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.25rem;
    }

    .music-square-card {
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .card-thumb-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.6rem;
      background-color: #111;
    }

    .card-thumb-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-play-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      display: grid;
      place-items: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .music-square-card:hover .card-play-overlay {
      opacity: 1;
    }

    .overlay-play-icon {
      width: 40px;
      height: 40px;
      background-color: rgba(0,0,0,0.7);
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Card Add Button Overlay */
    .card-add-overlay-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      z-index: 6;
    }

    .music-square-card:hover .card-add-overlay-btn {
      opacity: 1;
    }

    .card-add-overlay-btn:hover {
      background: var(--accent);
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-artist {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Playlist List Table View */
    .track-list-table {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .table-row {
      display: flex;
      align-items: center;
      padding: 0.6rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      gap: 1rem;
      position: relative;
    }

    .table-row:hover {
      background-color: rgba(255,255,255,0.05);
    }

    .table-row.active-playing {
      background-color: rgba(255, 0, 51, 0.1);
    }

    .table-row.active-playing .row-song-title {
      color: var(--accent);
    }

    /* Custom Playlists List Design */
    .playlist-folder-item {
      background: #161616;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .playlist-folder-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 0.5rem;
    }

    /* Bottom Player Deck Bar */
    .persistent-player-deck {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 90px;
      background-color: #1a1a1a;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: grid;
      grid-template-columns: 300px 1fr 300px;
      align-items: center;
      padding: 0 1.5rem;
      z-index: 1000;
    }

    .metadata-deck-display {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      min-width: 0;
    }

    .deck-thumbnail {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      object-fit: cover;
    }

    .deck-control-actions {
      display: flex;
      gap: 0.5rem;
    }

    .icon-action-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.4rem;
      border-radius: 50%;
    }

    .icon-action-btn:hover, .icon-action-btn.active {
      color: var(--text);
      background-color: rgba(255,255,255,0.1);
    }

    .icon-action-btn.active {
      color: var(--accent);
    }

    .center-stream-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .playback-buttons-cluster {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .master-play-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background-color: var(--text);
      color: var(--bg-app);
      border: none;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .master-play-circle svg {
      width: 18px;
      height: 18px;
    }

    .progress-slider-bar-track {
      width: 100%;
      max-width: 580px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .timestamp-ticker {
      font-size: 0.75rem;
      color: var(--text-muted);
      min-width: 35px;
    }

    .progress-interactive-rail {
      flex: 1;
      height: 3px;
      background-color: rgba(255,255,255,0.15);
      position: relative;
      cursor: pointer;
    }

    .progress-interactive-rail:hover {
      height: 5px;
    }

    .progress-rail-fill {
      height: 100%;
      width: 0%;
      background-color: var(--accent);
    }

    .utility-audio-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.75rem;
    }

    /* Playlist Selector Modal Modal */
    .playlist-modal-popup {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 5000;
      display: none;
      place-items: center;
    }

    .playlist-modal-popup.active-modal {
      display: grid;
    }

    .modal-card {
      background: #1f1f1f;
      border: 1px solid var(--border);
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .modal-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .modal-playlist-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 1.25rem;
    }

    .modal-playlist-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid transparent;
      color: #fff;
      padding: 0.75rem 1rem;
      text-align: left;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .modal-playlist-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.1);
    }

    .modal-close-btn {
      background: transparent;
      border: 1px solid #444;
      color: var(--text-muted);
      width: 100%;
      padding: 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .modal-close-btn:hover {
      color: #fff;
      border-color: #666;
    }

    /* Queue Up-Next Panel View */
    .queue-panel-drawer {
      position: fixed;
      right: -360px;
      bottom: 90px;
      top: 0;
      width: 360px;
      background-color: var(--bg-sidebar);
      border-left: 1px solid var(--border);
      z-index: 900;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .queue-panel-drawer.open {
      right: 0;
    }

    .queue-track-list {
      flex: 1;
      overflow-y: auto;
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* Toast Design */
    .alert-toast-popup {
      position: fixed;
      bottom: 110px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background-color: #212121;
      color: #fff;
      padding: 0.6rem 1.5rem;
      border-radius: 4px;
      font-size: 0.88rem;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 10000;
    }

    .alert-toast-popup.active-trigger {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ==========================================================================
       모바일 및 태블릿 최적화 반응형 레이아웃 (PC 기능 100% 유지)
       ========================================================================== */
    @media (max-width: 768px) {
      /* 1. 전체 앱 레이아웃을 상하 구조로 변경 */
      body {
        overflow: hidden;
      }
      
      .app-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: calc(100vh - 145px); /* 모바일 하단 플레이어 높이만큼 제외 */
      }

      /* 2. 좌측 사이드바 -> 상단 고정 네비게이션바로 변경 */
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 0.5rem 1rem;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        background-color: var(--bg-sidebar);
        z-index: 100;
      }

      .brand-section {
        display: none; /* 모바일 화면 공간 확보를 위해 로고 텍스트 숨김 */
      }

      .nav-menu {
        flex-direction: row;
        width: 100%;
        justify-content: space-around;
        gap: 0.25rem;
      }

      .nav-item {
        padding: 0.6rem;
        font-size: 0.85rem;
        flex: 1;
        text-align: center;
        justify-content: center;
        gap: 0.4rem;
        border-radius: 6px;
      }

      /* 3. 메인 뷰포트 및 헤더 조절 */
      .top-header-bar {
        padding: 0.5rem 1rem;
      }

      .search-wrapper {
        max-width: 100%; /* 검색창이 화면 가로를 꽉 채우도록 설정 */
      }

      .view-content-pane {
        padding: 1rem 1rem 3rem 1rem;
      }

      /* 4. 홈 화면 항목 배치 최적화 */
      .quick-picks-grid {
        grid-auto-columns: minmax(280px, 1fr); /* 모바일 좁은 화면에서도 카드가 깨지지 않게 조정 */
        gap: 0.5rem 1rem;
      }

      .yt-cards-grid {
        grid-template-columns: repeat(2, 1fr); /* 추천 믹스 등을 모바일 앱처럼 2열 구조로 배치 */
        gap: 0.75rem;
      }

      /* 5. 보관함 및 설정 탭의 반반(1fr 1fr) 구조 -> 모바일 세로 적층 구조로 강제 변경 */
      #pane-library > div {
        grid-template-columns: 1fr !important;
        gap: 2rem !important;
      }

      /* 6. 하단 플레이어 데크(Player Deck) 3열 구조 -> 3줄 적층형 구조로 전면 재배치 */
      .persistent-player-deck {
        display: flex;
        flex-direction: column;
        height: 145px; /* 모든 기능을 넉넉히 담기 위해 높이 확장 */
        padding: 0.6rem 1rem;
        gap: 0.5rem;
        justify-content: center;
        background-color: #121212;
      }

      /* 첫 번째 줄: 곡 정보 및 좋아요 버튼 */
      .metadata-deck-display {
        width: 100%;
        justify-content: space-between;
      }
      
      .metadata-deck-display .qp-meta {
        padding-right: 1rem;
      }

      /* 두 번째 줄: 미디어 컨트롤 및 프로그레스 바 */
      .center-stream-controls {
        width: 100%;
        gap: 0.4rem;
      }

      .playback-buttons-cluster {
        gap: 1.2rem;
      }
      
      .master-play-circle {
        width: 34px;
        height: 34px;
      }

      .progress-slider-bar-track {
        max-width: 100%;
      }

      /* 세 번째 줄: 가사/대기열 토글 및 볼륨 조절 슬라이더 */
      .utility-audio-controls {
        width: 100%;
        justify-content: space-between;
        padding-top: 0.4rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      #deck-volume-slider {
        width: 90px; /* 터치하기 편하도록 크기 유지 */
      }

      /* 7. 우측 서랍장(대기열 / 가사 창) 모바일 전체 화면 최적화 */
      .queue-panel-drawer {
        width: 100% !important;
        right: -100% !important;
        bottom: 145px !important; /* 플레이어 바로 위까지 채우도록 조정 */
        top: 0 !important;
        height: calc(100vh - 145px) !important;
        border-left: none;
      }

      .queue-panel-drawer.open {
        right: 0 !important;
      }

      /* 8. 토스트 알림 위치를 플레이어 위쪽으로 조정 */
      .alert-toast-popup {
        bottom: 160px;
      }
    }
  </style>
</head>
<body>

  <div class="app-layout">
    
    <aside class="sidebar">
      <div class="brand-section">
        <div class="brand-logo-ym">▶</div>
        <h1 class="brand-title">Aura Music</h1>
      </div>
      
      <nav class="nav-menu">
        <button type="button" class="nav-item active" data-target="pane-home">홈</button>
        <button type="button" class="nav-item" data-target="pane-top100">차트 (Top 100)</button>
        <button type="button" class="nav-item" data-target="pane-library">보관함 및 설정</button>
      </nav>
    </aside>

    <main class="main-viewport">
      <header class="top-header-bar">

      // Title String Text Processing Regex Formatter (Removes messy YouTube tags)
      function cleanTrackTitle(title) {
        return title
          .replace(/\[오피셜\]|\[MV\]|\[Music Video\]|오피셜|뮤직비디오/gi, "")
          .replace(/\(Official Video\)\|\(Official Audio\)\|\(MV\)/gi, "")
          .replace(/Official\s(Music\sVideo|Video|Audio)/gi, "")
          .replace(/【.*】|\[.*\]/g, "")
          .trim();
      }

      function parseTime(seconds) {
        if (!seconds || isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${String(s).padStart(2, '0')}`;

      async function callYoutubeApi(endpoint, params) {
        const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
        params.key = STATE.apiKey;
        Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
        const res = await fetch(url);
        if (!res.ok) throw new Error("API Failure");
        return await res.json();
      }

      // 가사 정보 추출 로드 및 비동기 주입 로직
      function updateLyricsView() {
        const track = STATE.playbackQueue[STATE.currentQueueIndex];
        if (!track) {
          dom.lyricsContent.innerHTML = "재생 중인 곡이 없습니다.";
          return;
        }
        
        dom.lyricsContent.innerHTML = `<p style="color:var(--text-muted); padding:1rem;">가사를 불러오는 중입니다...</p>`;

        // Fetch lyrics from our server endpoint
        const title = track.title;
        const artist = track.channelTitle || track.artist || "";
        const melonId = /^\d+$/.test(track.id) ? track.id : ""; // If it's numeric, it's Melon ID

        fetch(`/api/lyrics?title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}&melonId=${melonId}`)
          .then(res => res.json())
          .then(data => {
            // Check if the track hasn't changed while we were fetching
            const currentTrack = STATE.playbackQueue[STATE.currentQueueIndex];
            if (currentTrack && currentTrack.id === track.id) {
              dom.lyricsContent.innerText = data.lyrics;
            }
          })
          .catch(err => {
            console.error(err);
            const currentTrack = STATE.playbackQueue[STATE.currentQueueIndex];
            if (currentTrack && currentTrack.id === track.id) {
              dom.lyricsContent.innerText = `[${title} - ${artist}]\n\n가사를 불러올 수 없습니다.\n\nAura Music과 함께 즐거운 감상 되세요.`;
            }
          });
      }

      // YouTube Music Optimized Search Fetch Engine Dispatch Task
      async function dispatchSearch(query) {
        if (!query.trim()) {
          renderHomeFeeds();
          return;
        }

        if (!STATE.apiKey) {
          // Demo fallback search simulator regex lookup filter
          const matched = CORE_DATABASE.all.filter(t => 
            t.title.toLowerCase().includes(query.toLowerCase()) || 
            t.channelTitle.toLowerCase().includes(query.toLowerCase())
          );
          dom.recommendTitle.textContent = `"${query}" 검색 결과 (데모 데이터)`;
          renderQuickPicks(matched);
          return;
        }

        try {
          // Append specific keyword modifiers to enforce highest fidelity music streams matching
          const optimizationQuery = `${query} official audio topic`;
          const data = await callYoutubeApi("search", {
            part: "snippet",
            q: optimizationQuery,
            type: "video",
            videoCategoryId: "10", // Strictly Music category constraint filter
            maxResults: "12"
          });

          const dynamicTracks = data.items.map(item => ({
            id: item.id.videoId,
            title: cleanTrackTitle(item.snippet.title),
            channelTitle: item.snippet.channelTitle
          })).filter(t => t.id);

          dom.recommendTitle.textContent = `"${query}" 검색 결과`;
          renderQuickPicks(dynamicTracks);
          switchPanel("pane-home");
        } catch (e) {
          console.error(e);
          triggerToast("검색 도중 에러가 발생했습니다.");
        }
      }

      async function renderHomeFeeds() {
        const pool = CORE_DATABASE[STATE.currentMood] || CORE_DATABASE.all;
        
        if (STATE.apiKey) {
          try {
            // YouTube Music Style real-time trend mining matrix fetch sequence
            const queryMap = { all: "인기 얼터너티브 가요", energy: "신나는 케이팝 댄스 트랙", chill: "감성 인디 발라드", focus: "공부할때 듣는 로파이", romance: "달달한 알앤비 고백송" };
            const searchQueryStr = queryMap[STATE.currentMood] || "Kpop Music Latest Hits";
            
            const data = await callYoutubeApi("search", {
              part: "snippet",
              q: searchQueryStr,
              type: "video",
              videoCategoryId: "10",
              maxResults: "16"
            });

            const parsed = data.items.map(item => ({
              id: item.id.videoId,
              title: cleanTrackTitle(item.snippet.title),
              channelTitle: item.snippet.channelTitle
            })).filter(t => t.id);

            dom.recommendTitle.textContent = STATE.currentMood === "all" ? "빠른 선곡" : "맞춤형 추천 트랙";
            renderQuickPicks(parsed.slice(0, 8));
            renderRecommendGrid(parsed.slice(8));
            return;
          } catch (e) {
            console.error("Quota exceeded or validation failure. Engaging fallback engine core.");
          }
        }

        // Demo Fallback Render Pipeline
        dom.recommendTitle.textContent = "빠른 선곡";
        renderQuickPicks(pool);
        renderRecommendGrid(CORE_DATABASE.all);
      }

      // Custom Playlist Core Logics
      function createNewPlaylist() {
        const name = dom.createPlaylistInput.value.trim();
        if (!name) {
          triggerToast("재생목록 이름을 입력해주세요.");
          return;
        }

          triggerToast("이미 존재하는 재생목록 이름입니다.");
          return;
        }
        STATE.customPlaylists[name] = [];
        localStorage.setItem("aura_ym_custom_pls", JSON.stringify(STATE.customPlaylists));
        dom.createPlaylistInput.value = "";
        updateCustomPlaylistsView();
        triggerToast(`'${name}' 재생목록이 생성되었습니다.`);
      }

      function deletePlaylist(name) {
        delete STATE.customPlaylists[name];
        localStorage.setItem("aura_ym_custom_pls", JSON.stringify(STATE.customPlaylists));
        updateCustomPlaylistsView();
        triggerToast("재생목록이 삭제되었습니다.");
      }

      function addTrackToPlaylist(name, track) {
        if (name === "liked_bucket_builtin") {
          if (!STATE.likedTracks.some(t => t.id === track.id)) {
            STATE.likedTracks.push(track);
            localStorage.setItem("aura_ym_liked", JSON.stringify(STATE.likedTracks));
            updateLikedListView();
            triggerToast("좋아요 한 음악에 추가되었습니다.");
            if (STATE.playbackQueue[STATE.currentQueueIndex]?.id === track.id) {
              dom.deckLikeBtn.classList.add("active");
              dom.deckLikeBtn.textContent = "♥";
            }
          } else {
            triggerToast("이미 좋아요 한 음악에 존재합니다.");
          }
          return;
        }

        const list = STATE.customPlaylists[name];
        if (list) {
          if (list.some(t => t.id === track.id)) {
            triggerToast("이미 재생목록에 존재하는 곡입니다.");
            return;
          }
          list.push(track);
          localStorage.setItem("aura_ym_custom_pls", JSON.stringify(STATE.customPlaylists));
          updateCustomPlaylistsView();
          triggerToast(`'${name}'에 곡이 추가되었습니다.`);
        }
      }

      function removeTrackFromPlaylist(name, trackId) {
        if (STATE.customPlaylists[name]) {
          STATE.customPlaylists[name] = STATE.customPlaylists[name].filter(t => t.id !== trackId);
          localStorage.setItem("aura_ym_custom_pls", JSON.stringify(STATE.customPlaylists));
          updateCustomPlaylistsView();
          triggerToast("재생목록에서 곡이 제거되었습니다.");
        }
      }

      // Playlist Sync Logic (인덱스 식별값 옵션을 지원하도록 고도화)
      function setPlaylistContextAndPlay(tracksPool, targetTrackId, targetIndex) {
        STATE.playbackQueue = [...tracksPool];
        if (targetIndex !== undefined && targetIndex !== null) {
          STATE.currentQueueIndex = Number(targetIndex);
        } else {
          STATE.currentQueueIndex = STATE.playbackQueue.findIndex(t => t.id === targetTrackId);
        }
        
        if (STATE.shuffleActive) {
          STATE.preShuffleQueue = [...tracksPool];
          const currentTrack = STATE.playbackQueue[STATE.currentQueueIndex];
          // Extrude active playing index to absolute index zero position anchor point setup
          STATE.playbackQueue.splice(STATE.currentQueueIndex, 1);
          for (let i = STATE.playbackQueue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [STATE.playbackQueue[i], STATE.playbackQueue[j]] = [STATE.playbackQueue[j], STATE.playbackQueue[i]];
          }
          STATE.playbackQueue.unshift(currentTrack);
          STATE.currentQueueIndex = 0;
        }

        executeTrackPlayback();
      }

      async function executeTrackPlayback() {
        const track = STATE.playbackQueue[STATE.currentQueueIndex];
        if (!track) return;

        // If the track ID is not an 11-char YouTube ID, it's a Melon track that needs resolution
        const isYtId = /^[a-zA-Z0-9_-]{11}$/.test(track.id);
        
        // Show loading status in the deck
        dom.deckName.textContent = "로딩 중...";
        dom.deckArtist.textContent = track.artist || track.channelTitle || "";
        dom.deckArt.src = track.albumArt || `https://i.ytimg.com/vi/${track.id}/mqdefault.jpg`;
        dom.deckArt.style.opacity = "1";
        dom.deckPlayBtn.disabled = true;

        let ytVideoId = track.id;

        if (!isYtId) {
          if (track.ytId) {
            ytVideoId = track.ytId;
          } else {
            try {
              const queryStr = `${track.artist || track.channelTitle || ""} ${track.title} official audio`;
              const res = await fetch(`/api/search?q=${encodeURIComponent(queryStr)}`);
              const resData = await res.json();
              if (resData.success && resData.videoId) {
                ytVideoId = resData.videoId;
                track.ytId = ytVideoId; // Cache on track object
              } else {
                triggerToast("YouTube에서 곡을 찾을 수 없습니다.");
                dom.deckName.textContent = "재생 실패";
                return;
              }
            } catch (e) {
              console.error(e);
              triggerToast("YouTube 연동 중 오류가 발생했습니다.");
              dom.deckName.textContent = "재생 실패";
              return;
            }
          }
        }

        // Sync Metadata Display elements UI
        dom.deckName.textContent = track.title;
        dom.deckArtist.textContent = track.artist || track.channelTitle || "알 수 없음";
        dom.deckArt.src = track.albumArt || `https://i.ytimg.com/vi/${ytVideoId}/mqdefault.jpg`;
        dom.deckArt.style.opacity = "1";
        dom.deckPlayBtn.disabled = false;

        // Toggle Like State active status indicator glow
        const isLiked = STATE.likedTracks.some(t => t.id === track.id);
        dom.deckLikeBtn.classList.toggle("active", isLiked);
        dom.deckLikeBtn.textContent = isLiked ? "♥" : "♡";

        if (STATE.isEngineReady) {
          STATE.playerEngine.loadVideoById(ytVideoId);
          STATE.playerEngine.playVideo();
        }

        // Add to history list array stack handling duplicates asynchronously
        STATE.historyTracks = [track, ...STATE.historyTracks.filter(t => t.id !== track.id)];
        localStorage.setItem("aura_ym_history", JSON.stringify(STATE.historyTracks));
        updateHistoryListView();
        
        renderQueuePanelListView();
        updateLyricsView(); // 곡이 바뀔 때 가사뷰를 실시간 리로드 처리
        highlightActiveElementsGlobal();
        startTimelineTracker();
      }

      function startTimelineTracker() {
        clearInterval(STATE.tickerTimer);
        STATE.tickerTimer = setInterval(() => {
          if (!STATE.isEngineReady || !STATE.playerEngine.getCurrentTime) return;
          const cur = STATE.playerEngine.getCurrentTime();
          const dur = STATE.playerEngine.getDuration();
          
          dom.deckTimeCurrent.textContent = parseTime(cur);
          dom.deckTimeTotal.textContent = parseTime(dur);
          
          const pct = dur ? (cur / dur) * 100 : 0;
          dom.deckProgressFill.style.width = `${pct}%`;
        }, 500);
      }

      function renderQueuePanelListView() {
        dom.queueListTarget.innerHTML = STATE.playbackQueue.map((track, idx) => {
          const isCurrent = idx === STATE.currentQueueIndex;
          return `
            <div class="quick-pick-item ${isCurrent ? 'active-playing' : ''}" style="${isCurrent ? 'background:rgba(255,0,51,0.155);' : ''}" data-index="${idx}">
              <img class="qp-thumbnail" src="https://i.ytimg.com/vi/${track.id}/mqdefault.jpg" style="width:36px; height:36px;">
              <div class="qp-meta">
                <div class="qp-title" style="font-size:0.88rem; ${isCurrent ? 'color:var(--accent); font-weight:700;' : ''}">${track.title}</div>
                <div class="qp-artist" style="font-size:0.75rem;">${track.channelTitle}</div>
              </div>
            </div>
          `;
        }).join("");

        dom.queueListTarget.querySelectorAll(".quick-pick-item").forEach(el => {
          el.addEventListener("click", () => {
            STATE.currentQueueIndex = parseInt(el.dataset.index);
            executeTrackPlayback();
          });
        });
      }

      function highlightActiveElementsGlobal() {
        const currentTrack = STATE.playbackQueue[STATE.currentQueueIndex];
        if (!currentTrack) return;
        document.querySelectorAll(".table-row, .quick-pick-item, .music-square-card").forEach(el => {
          if (el.dataset.id === currentTrack.id) {
            el.classList.add("active-playing");
          } else {
            el.classList.remove("active-playing");
          }
        });
      }

      function skipNextTrack() {
        if (!STATE.playbackQueue.length) return;
        
        if (STATE.repeatMode === "one") {
          executeTrackPlayback();
          return;
        }

        STATE.currentQueueIndex++;
        
        if (STATE.currentQueueIndex >= STATE.playbackQueue.length) {
          STATE.currentQueueIndex = 0; 
          triggerToast("재생목록이 끝나 처음 곡부터 다시 재생합니다.");
        }
        
        executeTrackPlayback();
      }

      function skipPrevTrack() {
        if (!STATE.playbackQueue.length) return;
        STATE.currentQueueIndex--;
        if (STATE.currentQueueIndex < 0) {
          STATE.currentQueueIndex = STATE.playbackQueue.length - 1;
        }
        executeTrackPlayback();
      }

      function switchPanel(targetPaneId) {
        dom.navItems.forEach(btn => btn.classList.toggle("active", btn.dataset.target === targetPaneId));
        dom.viewPanes.forEach(pane => pane.classList.toggle("active", pane.id === targetPaneId));
        
        // 차트 메뉴 진입 시 Top 100 함수 호출 처리
        if (targetPaneId === "pane-top100") {
          renderTop100View();
        }
      }

      function initCoreEventListeners() {
        // Navigation system handling
        dom.navItems.forEach(item => {
          item.addEventListener("click", () => switchPanel(item.dataset.target));
        });

        // Mood filter actions routing logic
        dom.moodChips.forEach(chip => {
          chip.addEventListener("click", () => {
            dom.moodChips.forEach(c => c.classList.remove("active"));
            chip.classList.add("active");
            STATE.currentMood = chip.dataset.mood;
            renderHomeFeeds();
          });
        });

        // Search action dispatch routing logic interface binding
        dom.searchField.addEventListener("keydown", (e) => {
          if (e.key === "Enter") dispatchSearch(dom.searchField.value);
        });

        // Custom playlist creators trigger
        dom.createPlaylistBtn.addEventListener("click", createNewPlaylist);
        dom.createPlaylistInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") createNewPlaylist();
        });

        // Modal triggers
        dom.modalCloseBtn.addEventListener("click", closePlaylistModal);
        dom.playlistModal.addEventListener("click", (e) => {
          if(e.target === dom.playlistModal) closePlaylistModal();
        });

        // Saving Authentication API Token Storage Sequence Task
        dom.saveKeyBtn.addEventListener("click", () => {
          const val = dom.apiKeyInput.value.trim();
          localStorage.setItem("aura_ym_key", val);
          STATE.apiKey = val;
          triggerToast("API 설정 정보가 성공적으로 반영되었습니다.");
          renderHomeFeeds();
        });

        // Play/Pause structural control trigger block
        dom.deckPlayBtn.addEventListener("click", () => {
          if (!STATE.isEngineReady) return;
          const status = STATE.playerEngine.getPlayerState();
          if (status === 1) {
            STATE.playerEngine.pauseVideo();
          } else {
            STATE.playerEngine.playVideo();
          }
        });

        dom.deckNextBtn.addEventListener("click", skipNextTrack);
        dom.deckPrevBtn.addEventListener("click", skipPrevTrack);

        // Core interactive rail seek execution calculation sequence logic
        dom.deckProgressRail.addEventListener("click", (e) => {
          if (!STATE.isEngineReady || !STATE.playerEngine.getDuration) return;
          const rect = dom.deckProgressRail.getBoundingClientRect();
          const ratio = (e.clientX - rect.left) / rect.width;
          const targetSec = STATE.playerEngine.getDuration() * ratio;
          STATE.playerEngine.seekTo(targetSec, true);
        });

        // Master Volume Adjustment Slide event listener logic routing
        dom.deckVolume.addEventListener("input", () => {
          if (STATE.isEngineReady && STATE.playerEngine.setVolume) {
            STATE.playerEngine.setVolume(dom.deckVolume.value);
          }
        });

        // Like Button Event Registration
        dom.deckLikeBtn.addEventListener("click", () => {
          const track = STATE.playbackQueue[STATE.currentQueueIndex];
          if (!track) return;

          const idx = STATE.likedTracks.findIndex(t => t.id === track.id);
          if (idx > -1) {
            STATE.likedTracks.splice(idx, 1);
            triggerToast("보관함 좋아요 취소");
          } else {
            STATE.likedTracks.push(track);
            triggerToast("좋아요 한 음악 보관함 저장 완료 💖");
          }
          localStorage.setItem("aura_ym_liked", JSON.stringify(STATE.likedTracks));
          updateLikedListView();
          
          const isLiked = idx === -1;
          dom.deckLikeBtn.classList.toggle("active", isLiked);
          dom.deckLikeBtn.textContent = isLiked ? "♥" : "♡";
        });

        // Shuffle Mode Toggle Event Engine Block registration routine setup
        dom.deckShuffleBtn.addEventListener("click", () => {
          STATE.shuffleActive = !STATE.shuffleActive;
          dom.deckShuffleBtn.classList.toggle("active", STATE.shuffleActive);
          triggerToast(STATE.shuffleActive ? "셔플 모드가 켜졌습니다." : "셔플 모드가 꺼졌습니다.");
        });

        // Repeat Mode Switch Cycle Configuration Array Loop
        dom.deckRepeatBtn.addEventListener("click", () => {
          if (STATE.repeatMode === "none") {
            STATE.repeatMode = "all";
            dom.deckRepeatBtn.classList.add("active");
            dom.deckRepeatBtn.textContent = "🔁";
            triggerToast("전체 반복 재생 모드");
          } else if (STATE.repeatMode === "all") {
            STATE.repeatMode = "one";
            dom.deckRepeatBtn.classList.add("active");
            dom.deckRepeatBtn.textContent = "🔂";
            triggerToast("한 곡 반복 재생 모드");
          } else {
            STATE.repeatMode = "none";
            dom.deckRepeatBtn.classList.remove("active");
            dom.deckRepeatBtn.textContent = "🔁";
            triggerToast("기본 무한 사이클 재생 모드");
          }
        });

        // Side Queue Toggle Window Open/Close Dispatch Action Router
        dom.queueToggleBtn.addEventListener("click", () => {
          dom.queueDrawer.classList.toggle("open");
          if (dom.queueDrawer.classList.contains("open")) {
            dom.lyricsDrawer.classList.remove("open");
          }
        });

        // 가사 토글 이벤트 핸들러 인터페이스 연동 (상호 닫기 최적화)
        dom.lyricsToggleBtn.addEventListener("click", () => {
          dom.lyricsDrawer.classList.toggle("open");
          if (dom.lyricsDrawer.classList.contains("open")) {
            dom.queueDrawer.classList.remove("open");
          }
        });
      }

      window.onYouTubeIframeAPIReady = function() {
        STATE.playerEngine = new YT.Player("youtube-iframe-hardware-engine", {
          height: "0", width: "0",
          playerVars: {
            autoplay: 0, controls: 0, disablekb: 1, fs: 0, rel: 0, playsinline: 1, iv_load_policy: 3
          },
          events: {
            onReady: () => {
              STATE.isEngineReady = true;
              STATE.playerEngine.setVolume(dom.deckVolume.value);
            },
            onStateChange: (e) => {
              // Track playback icon symbol visual synchronization updates handling routine
              if (e.data === YT.PlayerState.PLAYING) {
                dom.deckPlayIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
              } else {
                dom.deckPlayIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
              }

              // Automatically trigger sequential track progression condition validation execution routing tasks
              if (e.data === YT.PlayerState.ENDED) {
                skipNextTrack();
              }
            }
          }
        });
      };

      // Asynchronously instantiate frame pipeline infrastructure loading tasks
      const scriptNode = document.createElement("script");
      scriptNode.src = "https://www.youtube.com/iframe_api";
      const anchor = document.getElementsByTagName("script")[0];
      anchor.parentNode.insertBefore(scriptNode, anchor);

      initSystemStorage();
      initCoreEventListeners();
      renderHomeFeeds();

    })();
  </script>
</body>
</html>
